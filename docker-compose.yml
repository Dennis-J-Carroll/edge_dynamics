services:
  collector:
    build:
      context: .
      target: collector
    container_name: edge_collector
    ports:
      - "7000:7000"
    volumes:
      - ./dicts:/app/dicts:ro
      - ./out:/app/out
    environment:
      EDGE_DICT_DIR: /app/dicts
      EDGE_OUT_DIR: /app/out
    networks:
      - edge_network
    restart: unless-stopped

  agent:
    build:
      context: .
      target: edge-agent
    container_name: edge_agent
    ports:
      - "8080:8080"       # health endpoint
    depends_on:
      - collector
    volumes:
      - ./dicts:/app/dicts
    environment:
      EDGE_COLLECTOR_HOST: collector
      EDGE_COLLECTOR_PORT: "7000"
      EDGE_DICT_DIR: /app/dicts
      EDGE_BATCH_MAX: "100"
      EDGE_BATCH_MS: "250"
      EDGE_COMPRESSION_LEVEL: "7"
    networks:
      - edge_network
    restart: unless-stopped

networks:
  edge_network:
    driver: bridge
